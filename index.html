<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tatake Plataformas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>
body{
margin:0;
background:url("https://i.imgur.com/8bKQXKp.jpeg") no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* TITULO PRO */
.titulo{
font-size:3rem;
font-weight:900;
text-align:center;
color:#ff2a2a;
text-shadow:0 0 10px #ff0000,0 0 20px #ff0000;
}

/* CARDS */
.card{
background:rgba(0,0,0,0.85);
border-radius:15px;
color:white;
padding:15px;
transition:.3s;
}
.card:hover{transform:scale(1.05);}

.product-img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.btn{
background:#22c55e;
padding:8px;
border-radius:8px;
width:100%;
margin-top:10px;
font-weight:bold;
}

/* BOTON FLOTANTE */
.floating{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50px;
color:white;
cursor:pointer;
}

.counter{
background:red;
border-radius:50%;
padding:2px 8px;
margin-left:5px;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}
</style>
</head>

<body class="p-4">

<div class="text-center mb-6">
<img src="https://imgur.com/kd7PZm2.png" class="mx-auto w-32 mb-2">
<h1 class="titulo">Tatake Plataformas</h1>
</div>

<div id="productos" class="grid md:grid-cols-3 gap-6"></div>

<!-- BOTON -->
<div class="floating" onclick="openCart()">
🛒 <span id="contador" class="counter">0</span>
</div>

<!-- MODAL -->
<div id="cartModal" class="modal">
<div class="modal-content">
<h2 class="text-xl font-bold mb-3">Tu pedido</h2>
<div id="cartItems"></div>

<button onclick="checkout()" class="bg-green-500 text-white w-full mt-3 p-2 rounded">
Enviar por WhatsApp
</button>

<button onclick="closeCart()" class="w-full mt-2 p-2 bg-gray-300 rounded">
Cerrar
</button>
</div>
</div>

<script src="index.js"></script>
</body>
</html>
