<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tatake Plataformas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>
body{
margin:0;
background:url("https://imgur.com/MYZ6UiM.jpeg") no-repeat center center fixed;
background-size:cover;
font-family:sans-serif;
}

/* capa oscura */
.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
}

/* LOGO */
.logo{
width:120px;
display:block;
margin:0 auto;
}

/* TITULO */
.titulo{
text-align:center;
font-size:2.2rem;
font-weight:900;
color:#ff3b3b;
margin-top:10px;
text-shadow:0 0 10px rgba(255,0,0,0.7);
}

/* CARDS */
.card{
background:#111;
border-radius:12px;
padding:12px;
color:white;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.product-img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

/* BOTON */
.btn{
background:#22c55e;
padding:8px;
border-radius:6px;
width:100%;
margin-top:8px;
font-weight:bold;
}

/* CARRITO */
.floating{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50px;
color:white;
cursor:pointer;
font-size:18px;
}

.counter{
background:red;
border-radius:50%;
padding:2px 7px;
margin-left:5px;
font-size:12px;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:350px;
}
</style>
</head>

<body>

<div class="overlay">

<!-- HEADER -->
<div>
<img src="https://imgur.com/kd7PZm2.png" class="logo">
<h1 class="titulo">Tatake Plataformas</h1>
</div>

<!-- PRODUCTOS -->
<div id="productos" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-6"></div>

</div>

<!-- BOTON CARRITO -->
<div class="floating" onclick="openCart()">
🛒 <span id="contador" class="counter">0</span>
</div>

<!-- MODAL -->
<div id="cartModal" class="modal">
<div class="modal-content">
<h2 class="font-bold mb-2 text-center">Tu pedido</h2>
<div id="cartItems"></div>

<button onclick="checkout()" class="bg-green-500 text-white w-full mt-2 p-2 rounded">
Enviar por WhatsApp
</button>

<button onclick="closeCart()" class="w-full mt-2 p-2 bg-gray-300 rounded">
Cerrar
</button>
</div>
</div>

<script src="index.js"></script>
</body>
</html>
