<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tatake Plataformas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>
body{
margin:0;
background:url("https://i.imgur.com/8bKQXKp.jpeg") no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
top:0;
left:0;
z-index:-1;
}

.titulo{
font-size:3rem;
font-weight:900;
text-align:center;
background:linear-gradient(90deg,#ff6a00,#ff0000,#00c3ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:rgba(0,0,0,0.75);
border-radius:15px;
color:white;
padding:15px;
transition:.3s;
}
.card:hover{transform:scale(1.05);}

.product-img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

select{
width:100%;
margin-top:5px;
padding:6px;
border-radius:6px;
color:black;
}

.btn{
background:linear-gradient(90deg,#00c853,#64dd17);
padding:8px;
border-radius:8px;
width:100%;
margin-top:10px;
font-weight:bold;
}

/* carrito */
.floating{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
}

.counter{
background:red;
border-radius:50%;
padding:3px 8px;
margin-left:5px;
font-size:12px;
}
</style>
</head>

<body class="p-4">

<div class="max-w-7xl mx-auto">

<div class="text-center mb-8">
<img src="https://imgur.com/kd7PZm2.png" class="mx-auto w-32 mb-2">
<h1 class="titulo">Tatake Plataformas</h1>
</div>

<div id="productos" class="grid md:grid-cols-3 gap-6"></div>

</div>

<div class="floating" onclick="checkout()">
🛒 Pedido <span id="contador" class="counter">0</span>
</div>

<script src="index.js"></script>
</body>
</html>
